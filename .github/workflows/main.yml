name: Lint and Test

on: [push, pull_request]

jobs:
  verify:
    name: Verify
    runs-on: ubuntu-latest
    steps:
      - name: Set up Go
        uses: actions/setup-go@v3
        with:
          go-version: "1.18"
      - name: Checkout repo
        uses: actions/checkout@v3
      - name: Lint code
        uses: golangci/golangci-lint-action@v3
        with:
          version: v1.46
          args: --timeout=5m
      - name: Run tests
        run: make test
      - name: Build application
        run: |
          export GIT_COMMIT=$(git rev-list -1 HEAD) && \
          export BUILD_DATE=$(date +'%Y-%m-%dT%H:%M:%S') && \
          export GITHUB_TAG=$(git tag --points-at HEAD) && \
          go build -ldflags "-X main.githash=$GIT_COMMIT -X main.date=$BUILD_DATE -X main.gittag=$GITHUB_TAG"
          echo -e "Git Tag: \t$(GITHUB_TAG)\nGit Commit: \t$(GIT_COMMIT) \nBuild Date: \t$(BUILD_DATE)"
  release:
    name: Release
    needs: verify
    if: startsWith(github.ref, 'refs/tags/v')
    runs-on: ubuntu-latest
    steps:
      - name: Set up Go
        uses: actions/setup-go@v3
        with:
          go-version: "1.18"
      - name: Checkout repo
        uses: actions/checkout@v3
      - name: Release
        uses: goreleaser/goreleaser-action@v3
        with:
          args: release --rm-dist
        env:
          GITHUB_TOKEN: "${{ secrets.GITHUB_TOKEN }}"
